name: Maker-Bundle CI
on: [push, pull_request]
jobs:
  build:
    name: MakerBundle
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        php-versions: ['7.2']
    env:
      PHPUNIT_FLAGS: '-v'
      SYMFONY_PHPUNIT_DIR: $GITHUB_WORKSPACE/symfony-bridge/.phpunit
      SYMFONY_REQUIRE: '>=3.4'
    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: false
          MYSQL_ROOT_PASSWORD: password
        ports:
          - 3306
        options: --health-cmd="mysqladmin ping" --health-interval=5s --health-timeout=2s --health-retries=3
    steps:
      env:
        DATABASE_URL: mysql://root:password@127.0.0.1:${{ job.services.mysql.ports['3306'] }}/maker_bundle_ci
      - name: Checkout
        uses: actions/checkout@v2.0.0

      - name: Ping MySQL
        run: |
          while ! mysqladmin ping -h"127.0.0.1" -P"3306" --silent; do
            sleep 1
          done

      - name: Test MySQL
        run: |
          mysql -h"127.0.0.1" -P${{ job.services.mysql.ports['3306'] }} -uroot -ppassword -e "SHOW DATABASES"

#      - name: Remove xdebug.ini
#        run: find ~/.phpenv -name xdebug.ini -delete

      - name: Composer global
        run: composer global require --no-progress --no-scripts --no-plugins symfony/flex dev-master

      - name: Composer update
        run: composer update

      - name: Get phpunit
        run: vendor/bin/simple-phpunit install

      - name: Validate Composer
        run: composer validate --strict --no-check-lock

      - name: Run PHPUnit Test Suite
        run: vendor/bin/simple-phpunit $PHPUNIT_FLAGS

      - name: CS Fixer
        run: vendor/bin/php-cs-fixer fix --dry-run --diff
        if: always()